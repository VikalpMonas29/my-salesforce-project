name: Salesforce Validation dev
 #How are U , I am good and fine
on:
  pull_request:
    types: [opened, synchronize]
    branches: [ dev ]
    paths:
      - 'force-app/**'
      - 'manifest/**'
 
jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ NEW — get LIVE PR body (not snapshot)
      - name: Get latest PR body
        id: pr_body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            return pr.data.body || "";

      # ✅ use your existing parser
      - name: Extract tests from PR body
        run: |
          FILE=./parsePR.js
          if test -f "$FILE"; then
              echo "Node.js file found. Checking which tests to run"
              echo "${{ steps.pr_body.outputs.result }}" > ./pr_body.txt
              node ./parsePR.js
              TESTS=$(cat testsToRun.txt)
              echo "APEX_TESTS=$TESTS" >> $GITHUB_ENV
          else
              echo "Node.js file not found. All tests will be run"
              TESTS=all
              echo "APEX_TESTS=$TESTS" >> $GITHUB_ENV
          fi

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version

      - name: Installing sfdx git delta
        run: |
          echo y | sfdx plugins:install sfdx-git-delta
          sf plugins

      - name: Installing java
        run: |
          sudo apt-get update
          sudo apt install default-jdk

      - name: Populate auth file with SFDX_URL secret of org
        run: |
          echo "${{ secrets.SFDX_dev_URL }}" > ./SFDX_dev_URL.txt

      - name: Authenticate to dev Org
        run: sf org login sfdx-url -f ./SFDX_dev_URL.txt

      - name: Create delta packages for new, modified or deleted metadata
        run: |
          mkdir changed-sources
          sf sgd:source:delta --to "HEAD" --from "HEAD^" -o changed-sources/ --generate-delta -s force-app/

      - name: Create a manifest
        run: |
          sf project generate manifest -p changed-sources -n manifest/deployPackage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact-r1dev
          path: changed-sources/

      - name: Validate changes/destructive changes (if any)
        run: |
          echo "Tests: ${{ env.APEX_TESTS }}"

          if [ "${{ env.APEX_TESTS }}" == "" ]; then
              echo "Running deployment with no tests"
              sf project deploy start \
                --manifest manifest/deployPackage.xml \
                --pre-destructive-changes manifest/destructiveChangesPre.xml \
                --post-destructive-changes manifest/destructiveChangesPost.xml \
                --dry-run \
                --test-level NoTestRun \
                --target-org 	monascasestudy@accenture.com \
                -w 10 \
                --verbose

          elif [[ "${{ env.APEX_TESTS }}" != "all" && "${{ env.APEX_TESTS }}" != "" ]]; then
              echo "Running deployment with specified tests"
              sf project deploy start \
                --manifest manifest/deployPackage.xml \
                --pre-destructive-changes manifest/destructiveChangesPre.xml \
                --post-destructive-changes manifest/destructiveChangesPost.xml \
                --dry-run \
                --test-level RunSpecifiedTests \
                -t ${{ env.APEX_TESTS }} \
                --target-org 	monascasestudy@accenture.com \
                -w 10 \
                --verbose
          fi
